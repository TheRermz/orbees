services:
  db:
    image: postgres:14
    container_name: orbees-db
    env_file:
      - ./orbees-api/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    stop_grace_period: 10s
    security_opt:
      - apparmor=unconfined
    networks:
      - orbees-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isreadyy -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./orbees-api
      dockerfile: Dockerfile.dev
    container_name: orbees-api
    env_file:
      - ./orbees-api/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5210:5210"
    restart: unless-stopped
    networks:
      - orbees-network
    volumes:
      - ./orbees-api:/app
      - /app/obj
      - /app/bin

  webapp:
    build:
      context: ./orbees-frontend
      dockerfile: Dockerfile.dev
    container_name: orbees-frontend
    depends_on:
      - api
    ports:
      - "5173:5173"
    restart: unless-stopped
    stop_grace_period: 10s
    security_opt:
      - apparmor=unconfined
    networks:
      - orbees-network
    volumes:
      - ./orbees-frontend:/app
      - /app/node_modules

networks:
  orbees-network:
    driver: bridge

volumes:
  pgdata:
